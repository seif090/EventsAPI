version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: EventsAPI/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=sqlserver;Database=EventsDb;User Id=sa;Password=Your_password123;TrustServerCertificate=True
      Jwt__Issuer: EventsAPI
      Jwt__Audience: EventsAPI
      Jwt__Key: CHANGE_THIS_TO_A_SECURE_KEY_32_CHARS_MIN
      Redis__ConnectionString: redis:6379
      Redis__InstanceName: EventsApi
    depends_on:
      - sqlserver
      - redis

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "Your_password123"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  sqlserver_data:
